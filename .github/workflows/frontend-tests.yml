name: 🖥️ Testes do Frontend

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend-tests:
    name: Testes da Interface (Cypress + HTML/CSS/JS)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Instalar dependências do backend
        working-directory: backend
        run: npm install

      - name: 📦 Instalar Cypress e serve (raiz)
        run: npm install

      - name: 🚀 Iniciar servidor Express (backend)
        working-directory: backend
        run: node index.js &
        env:
          PORT: 3001

      - name: ⏳ Aguardar API estar pronta
        run: |
          echo "Aguardando API na porta 3001..."
          timeout 30 bash -c 'until curl -s http://localhost:3001/api/health > /dev/null; do sleep 1; done'
          echo "API está pronta!"

      - name: 🌐 Servir frontend estático
        run: npx serve frontend -l 5500 &

      - name: ⏳ Aguardar frontend estar pronto
        run: |
          echo "Aguardando frontend na porta 5500..."
          timeout 30 bash -c 'until curl -s http://localhost:5500 > /dev/null; do sleep 1; done'
          echo "Frontend está pronto!"

      - name: 🧪 Executar testes do frontend
        run: npx cypress run --spec "cypress/e2e/frontend.cy.js" --config baseUrl=http://localhost:5500
        env:
          CYPRESS_FRONTEND_URL: http://localhost:5500

      - name: 📊 Upload de screenshots (falhas)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-frontend
          path: cypress/screenshots

      - name: 🎬 Upload de vídeos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-frontend
          path: cypress/videos
