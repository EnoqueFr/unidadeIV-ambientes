name: 🔧 Testes do Backend

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-tests:
    name: Testes da API (Cypress + Express)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Instalar dependências do backend
        working-directory: backend
        run: npm install

      - name: 📦 Instalar Cypress e serve (raiz)
        run: npm install

      - name: 🚀 Iniciar servidor Express
        working-directory: backend
        run: node index.js &
        env:
          PORT: 3001

      - name: ⏳ Aguardar API estar pronta
        run: |
          echo "Aguardando API na porta 3001..."
          timeout 30 bash -c 'until curl -s http://localhost:3001/api/health > /dev/null; do sleep 1; done'
          echo "API está pronta!"

      - name: 🧪 Executar testes do backend
        run: npx cypress run --spec "cypress/e2e/backend.cy.js" --config baseUrl=http://localhost:3001

      - name: 📊 Upload de screenshots (falhas)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-backend
          path: cypress/screenshots
